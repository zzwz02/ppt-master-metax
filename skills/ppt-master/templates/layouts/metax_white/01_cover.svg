<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- Template: Cover Page - MetaX Standard White -->

    <defs>
        <linearGradient id="purpleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#660874"/>
            <stop offset="100%" style="stop-color:#51318E"/>
        </linearGradient>
    </defs>

    <!-- Full-bleed background image -->
    <image href="cover_bg.jpeg" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>

    <!-- MetaX Logo (top-left) -->
    <image href="metax_logo_cover.png" x="85" y="37" width="176" height="80" preserveAspectRatio="xMidYMid meet"/>

    <!-- Stock code -->
    <text x="90" y="142" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.85">
        股票代码: 688802.SH
    </text>

    <!-- Main title -->
    <text x="78" y="300" font-family="Source Han Sans CN, 思源黑体 CN Bold, Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">
        {{TITLE}}
    </text>

    <!-- Purple accent bar -->
    <rect x="90" y="340" width="218" height="11" fill="#660874" rx="2"/>

    <!-- Subtitle -->
    <text x="78" y="390" font-family="Source Han Sans CN, 思源黑体 CN Regular, Arial, sans-serif" font-size="24" fill="#FFFFFF" fill-opacity="0.9">
        {{SUBTITLE}}
    </text>

    <!-- Date -->
    <text x="78" y="430" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.7">
        {{DATE}}
    </text>

    <!-- Author -->
    <text x="78" y="460" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.7">
        {{AUTHOR}}
    </text>

</svg>
