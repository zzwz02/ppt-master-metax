<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- Template: Content Page - MetaX Standard White -->

    <defs>
        <linearGradient id="topBarGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#660874"/>
            <stop offset="100%" style="stop-color:#51318E"/>
        </linearGradient>
    </defs>

    <!-- White background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Top accent bar (purple gradient) -->
    <rect x="0" y="83" width="351" height="6" fill="url(#topBarGradient)"/>

    <!-- Top connector line -->
    <line x1="351" y1="86" x2="1100" y2="86" stroke="#660874" stroke-width="1"/>

    <!-- MetaX Logo (top-right) -->
    <image href="logo_header.png" x="1103" y="49" width="117" height="28" preserveAspectRatio="xMidYMid meet"/>

    <!-- Page title -->
    <text x="35" y="60" font-family="Source Han Sans CN, 思源黑体 CN Bold, Arial, sans-serif" font-size="32" font-weight="bold" fill="#000000">
        {{PAGE_TITLE}}
    </text>

    <!-- Content area placeholder -->
    <rect x="88" y="113" width="1094" height="536" fill="#FFFFFF" stroke="#E5E6E9" stroke-width="1" stroke-dasharray="8,4" rx="8"/>
    <text x="635" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#CBD5E1">
        {{CONTENT_AREA}}
    </text>

    <!-- Footer: Confidential notice -->
    <text x="13" y="700" font-family="Arial, sans-serif" font-size="12" fill="#898989">
        | 沐曦内部资料 | MetaX Confidential | All Rights Reserved |
    </text>

    <!-- Footer: Page number -->
    <text x="1240" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#898989">
        {{PAGE_NUM}}
    </text>

</svg>
