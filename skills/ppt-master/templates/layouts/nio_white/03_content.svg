<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- Template: Content Page - NIO Standard White -->

    <!-- White background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Page title (H2, 36px Light, left-aligned) -->
    <text x="40" y="78" font-family="Blue Sky Standard Light, Source Han Sans CN, PingFang SC, Arial, sans-serif" font-size="36" font-weight="300" fill="#000F17">
        {{PAGE_TITLE}}
    </text>

    <!-- Content area placeholder (compact variant: 40, 134, 1152, 529) -->
    <rect x="40" y="134" width="1152" height="529" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="616" y="400" text-anchor="middle" font-family="Blue Sky Standard Light, Source Han Sans CN, PingFang SC, Arial, sans-serif" font-size="16" fill="#545859" fill-opacity="0.6">
        {{CONTENT_AREA}}
    </text>

    <!-- Footer left: NIO watermark with teal terminal word -->
    <text x="40" y="691" font-family="Blue Sky Standard Regular, Source Han Sans CN, PingFang SC, Arial, sans-serif" font-size="11" fill="#545859">
        <tspan>NIO · </tspan><tspan fill="#00BEBE">{{FOOTER_LEFT}}</tspan>
    </text>

    <!-- Footer date -->
    <text x="1069" y="691" font-family="Blue Sky Standard Regular, Source Han Sans CN, PingFang SC, Arial, sans-serif" font-size="11" fill="#545859">
        {{DATE}}
    </text>

    <!-- Page number -->
    <text x="1239" y="691" text-anchor="end" font-family="Blue Sky Standard Regular, Source Han Sans CN, PingFang SC, Arial, sans-serif" font-size="11" fill="#545859">
        {{PAGE_NUM}}
    </text>

</svg>
